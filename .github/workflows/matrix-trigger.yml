name: Matrix Agentic Backport
on:
  pull_request:
    types: [closed]
    branches:
      - 'carbon-apimgt-v4.4.0'

jobs:
  backport-matrix:
    if: github.event.pull_request.merged == true
    strategy:
      fail-fast: false
      matrix:
        target_branch: ['carbon-apimgt-v4.3.0', 'carbon-apimgt-v4.2.0', 'carbon-apimgt-v4.1.0']
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Orchestrator (v4.4.0)
        uses: actions/checkout@v6
        with:
          path: 'orchestrator'

      - name: Checkout Target Workspace (${{ matrix.target_branch }})
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.target_branch }}
          path: 'workspace'

      - name: Install gh-aw CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-aw

      - name: Execute Agentic Workflow
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          ORIGINAL_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd ${{ github.workspace }}/workspace
          gh aw run ../orchestrator/.github/workflows/backport-agent.lock.yml
